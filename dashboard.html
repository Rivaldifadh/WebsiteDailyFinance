<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pencatat Keuangan Harian</title>
    <link rel="stylesheet" href="css/dashboard.css" />
  </head>

  <header>
    <div class="logo">
        💰 Daily Finance
    </div>

    <nav class="nav-link">
        <a href="facePage.html" class="btn-nav">Home</a>
        <a href="index.html" class="btn-nav">Logout</a>
    </nav>
    
  </header>
  <body>
    <div class="container">
      <h1>Pencatat Keuangan Harian</h1>
      <form id="formKeuangan">
        <input type="date" id="tanggal" required />

        <select id="jenis">
          <option value="Pemasukan">Pemasukan</option>
          <option value="Pengeluaran">Pengeluaran</option>
        </select>

        <input type="text" id="keterangan" placeholder="Keterangan" required />

        <input type="number" id="nominal" placeholder="Nominal" required />

        <button type="submit">Simpan</button>
      </form>

      <div class="summary">
        <h3>
          Total Pemasukan :
          <span id="totalPemasukan">Rp0</span>
        </h3>

        <h3>
          Total Pengeluaran :
          <span id="totalPengeluaran">Rp0</span>
        </h3>

        <h3>
          Saldo :
          <span id="saldo">Rp0</span>
        </h3>
      </div>

      <h2>Data Keuangan</h2>
      <div class="table-responsive">
        <table>
          <thead>
            <tr>
              <th>Tanggal</th>
              <th>Jenis</th>
              <th>Keterangan</th>
              <th>Nominal</th>
              <th>Aksi</th>
            </tr>
          </thead>

          <tbody id="dataKeuangan"></tbody>
        </table>
        </div>
      </div>
    </div>
    <script type="module" src="js/finance.js"></script>
    <script type="module" src="js/Authentication.js"></script>
  </body>
</html>
